name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v0.1.6'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build-linux:
    name: Build Linux release bundles
    runs-on: ubuntu-22.04
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate updater signing key
        shell: bash
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is not set."
            exit 1
          fi
          if [[ "$TAURI_SIGNING_PRIVATE_KEY" != *"untrusted comment:"* ]]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY must be the full private key text generated by Tauri signer, including the 'untrusted comment:' lines. Do not use the public key."
            exit 1
          fi

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            rpm \
            wget
          if apt-cache show libfuse2 >/dev/null 2>&1; then
            sudo apt-get install -y libfuse2
          else
            sudo apt-get install -y libfuse2t64
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Linux release bundles
        run: pnpm tauri build

      - name: Upload Linux release bundles
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-bundles
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/deb/*.deb.sig
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/rpm/*.rpm.sig
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.sig

  build-windows:
    name: Build Windows release bundles
    runs-on: windows-latest
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate updater signing key
        shell: bash
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is not set."
            exit 1
          fi
          if [[ "$TAURI_SIGNING_PRIVATE_KEY" != *"untrusted comment:"* ]]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY must be the full private key text generated by Tauri signer, including the 'untrusted comment:' lines. Do not use the public key."
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows release bundles
        run: pnpm tauri build

      - name: Upload Windows release bundles
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-bundles
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.sig

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download release bundles
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate updater manifest
        shell: bash
        run: |
          linux_appimage="$(find release-assets -name '*.AppImage' -type f | head -n 1)"
          windows_installer="$(find release-assets -name '*.exe' -type f | head -n 1)"
          if [ -z "$linux_appimage" ] || [ -z "$windows_installer" ]; then
            echo "::error::Could not find AppImage and NSIS exe assets for updater manifest."
            exit 1
          fi
          node scripts/generate-updater-manifest.mjs \
            --base-url "https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}" \
            --artifact "linux-x86_64=$linux_appimage" \
            --artifact "windows-x86_64=$windows_installer" \
            --output release-assets/latest.json \
            --notes "Release ${RELEASE_TAG}"

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          files: release-assets/**/*
          fail_on_unmatched_files: true
